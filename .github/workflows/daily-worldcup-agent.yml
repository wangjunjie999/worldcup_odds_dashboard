name: Daily World Cup Agent

on:
  workflow_dispatch:
  schedule:
    # 15:30 Asia/Shanghai
    - cron: "30 7 * * *"

permissions:
  contents: write

jobs:
  validate-current-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate current static data
        run: node scripts/validate-data.js

      - name: Print agent command
        run: |
          echo "Daily 15:30 Asia/Shanghai agent command is stored in automation/TRAE_SOLO_DAILY_COMMAND.md"
          echo "This workflow validates committed data. Browser scraping should run in Trae SOLO / Codex local automation or another connected runner."
